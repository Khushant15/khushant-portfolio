<!doctype html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary SEO -->
  <title>Khushant Sharma | Full Stack & AI Developer</title>
  <meta name="description" content="Portfolio of Khushant Sharma — Python Developer, Full Stack Learner, Firebase & React enthusiast. Explore projects, skills, and experience." />
  <meta name="keywords" content="Khushant Sharma, portfolio, Python developer, React, Firebase, full stack, MERN, Angular, Kotlin, web developer India" />
  <meta name="author" content="Khushant Sharma" />
  <meta name="theme-color" content="#01040f" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://khushant-portfolio.vercel.app/" />
  <meta property="og:title" content="Khushant Sharma | Full Stack & AI Developer" />
  <meta property="og:description" content="Explore Khushant Sharma's portfolio — projects, skills, experience and more." />
  <meta property="og:image" content="https://khushant-portfolio.vercel.app/og-image.png" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://khushant-portfolio.vercel.app/" />
  <meta name="twitter:title" content="Khushant Sharma | Full Stack & AI Developer" />
  <meta name="twitter:description" content="Explore Khushant Sharma's portfolio — projects, skills, experience and more." />
  <meta name="twitter:image" content="https://khushant-portfolio.vercel.app/og-image.png" />

  <!-- Canonical -->
  <link rel="canonical" href="https://khushant-portfolio.vercel.app/" />

  <!-- Favicon -->
  <link rel="icon" href="/favicon.png" type="image/png" />
  <link rel="apple-touch-icon" href="/favicon.png" />

  <!-- Robots -->
  <meta name="robots" content="index, follow" />

  <!-- Anti-flash: apply stored theme before React loads -->
  <script>
    (function () {
      var stored = localStorage.getItem('theme');
      var dark = stored ? stored === 'dark' : true; // default: dark
      if (dark) document.documentElement.classList.add('dark');
      else document.documentElement.classList.remove('dark');
    })();
  </script>

  <!-- Vite -->
  <script type="module" src="/src/main.jsx"></script>
</head>

<body class="bg-white dark:bg-black text-black dark:text-white transition-colors duration-300">
  <div id="root"></div>
</body>

</html>
